name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/accessflow-backend
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/accessflow-frontend

jobs:
  # ==================== CI: Pull Request a Dev/Main ====================
  ci-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: "CI: PR a Dev/Main"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest black isort pylint

      - name: Lint (Black)
        working-directory: ./backend
        run: black --check . || true

      - name: Lint (isort)
        working-directory: ./backend
        run: isort --check-only . || true

      - name: Lint (Pylint)
        working-directory: ./backend
        run: pylint app/ --exit-zero || true

      - name: Run tests
        working-directory: ./backend
        run: pytest tests/ -v || true

      - name: Build image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_BACKEND }}:dev-pr ./backend
          docker build -t ${{ env.DOCKER_IMAGE_FRONTEND }}:dev-pr ./frontend

  # ==================== CD: Merge a Dev ====================
  cd-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    name: "CD: Deploy Dev"
    
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_BACKEND }}:dev
            ${{ env.DOCKER_IMAGE_BACKEND }}:dev-${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/accessflow-frontend:dev
            ${{ secrets.DOCKERHUB_USERNAME }}/accessflow-frontend:dev-${{ github.sha }}

      - name: Deploy to Render Dev
        run: |
          curl -X POST ${{ secrets.RENDER_DEV_DEPLOY_HOOK }}

  # ==================== CD: Production (via tag o main) ====================
  cd-prod:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    name: "CD: Deploy Prod"
    
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend (Prod)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_BACKEND }}:latest
            ${{ env.DOCKER_IMAGE_BACKEND }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE_BACKEND }}:prod

      - name: Build and push Frontend (Prod)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/accessflow-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/accessflow-frontend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/accessflow-frontend:prod

      - name: Deploy to Render Prod
        run: |
          curl -X POST ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
