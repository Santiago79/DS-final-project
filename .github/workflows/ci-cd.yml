name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request:

env:
  REGISTRY: docker.io
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/pset-accesflow-backend
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/pset-accesflow-frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff

      - name: Run lint
        run: ruff check backend/

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: pytest backend/tests/ -v || true

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Backend image (test)
        run: docker build -t ${{ env.DOCKER_IMAGE_BACKEND }}:latest ./backend

      - name: Build Frontend image (test)
        run: docker build -t ${{ env.DOCKER_IMAGE_FRONTEND }}:latest ./frontend

  docker-push-dev:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_BACKEND }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-

      - name: Build & Push Backend (dev)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract Docker metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_FRONTEND }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-

      - name: Build & Push Frontend (dev)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  deploy-dev:
    needs: docker-push-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend Dev
        run: curl -X POST ${{ secrets.RENDER_BACKEND_DEV_HOOK }}

      - name: Deploy Frontend Dev
        run: curl -X POST ${{ secrets.RENDER_FRONTEND_DEV_HOOK }}

  docker-push-prod:
    needs: docker-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_BACKEND }}
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=ref,event=tag
            type=sha

      - name: Build & Push Backend (prod)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract Docker metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=ref,event=tag
            type=sha

      - name: Build & Push Frontend (prod)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  deploy-prod:
    needs: docker-push-prod
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend Prod
        run: curl -X POST ${{ secrets.RENDER_BACKEND_PROD_HOOK }}

      - name: Deploy Frontend Prod
        run: curl -X POST ${{ secrets.RENDER_FRONTEND_PROD_HOOK }}
